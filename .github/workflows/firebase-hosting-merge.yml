# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Flutter kurulumu
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'
      
      # Flutter bağımlılıklarını yükleme
      - name: Install Dependencies
        run: flutter pub get
      
      # Web build
      - name: Build Web
        run: flutter build web
        
      # Deep linking dosyalarını build çıktısına kopyalama
      - name: Copy Deep Linking Files
        run: |
          mkdir -p build/web/.well-known
          cp web/.well-known/apple-app-site-association build/web/.well-known/apple-app-site-association
          cp web/.well-known/assetlinks.json build/web/.well-known/assetlinks.json

      # Firebase'e deploy
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TABIKI_WEB }}'
          channelId: live
          projectId: tabiki-web
